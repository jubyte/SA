<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>login e cadastro</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

</head>

<body>
<div class="bg"></div>
<div class="overlay"></div>

<main class="container d-flex align-items-center justify-content-center vh-100">

    <section class="login w-100 d-flex justify-content-center">

        <div class="login__box">

            <header class="login__header text-center">

                <h1 id="titulo" class="login__title">LOGIN</h1>

                <div class="login__divider">
                    <span class="login__line"></span>
                    <img src="assets/logo_sem_letra.png" alt="Símbolo" class="login__logo">
                    <span class="login__line"></span>
                </div>

            </header>

            <form id="form-login" novalidate>

                <div class="mb-3">
                    <label for="email" class="form-label login__label">EMAIL</label>
                    <input type="email" id="email" class="form-control login__input" required>
                </div>

                <div class="mb-3">
                    <label for="senha" class="form-label login__label">SENHA</label>
                    <input type="password" id="senha" class="form-control login__input" required>
                </div>

                <button class="btn login__button w-100" type="submit">
                    ENTRAR
                </button>

                   <div id="mensagem" class="text-center mt-3"></div>

            </form>

             <div class="text-center mt-3">
                <a href="#" id="toggle" class="login__link">
                    Não tem uma conta? Cadastre-se
                </a>
            </div>

        </div>

    </section>

</main>

    <script src="js/script.js"></script>
</body>
</html>
